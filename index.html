<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ATLAS Technology Demo</title>
<style>
  html, body { margin:0; padding:0; overflow:hidden; background:#111; font-family:'Arial', sans-serif; }
  #overlay {
    position:absolute; top:50%; left:50%; transform:translate(-50%, -50%);
    text-align:center; font-size:3em; color:#ccc; letter-spacing:3px;
    pointer-events:none;
  }
  canvas { display:block; }
</style>
</head>
<body>
<div id="overlay">ATLAS TECHNOLOGY</div>
<script src="https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>
<script>
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111111);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.z = 5;

const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Neon cube
const geometry = new THREE.BoxGeometry(1.5,1.5,1.5);
const material = new THREE.MeshStandardMaterial({ color:0x00ffcc, emissive:0x00ffcc, roughness:0.1, metalness:0.9 });
const cube = new THREE.Mesh(geometry, material);
scene.add(cube);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);
const pointLight = new THREE.PointLight(0x00ffcc, 1.5, 50);
pointLight.position.set(5,5,5);
scene.add(pointLight);

// Continuous rotation
function animate() {
  requestAnimationFrame(animate);
  cube.rotation.x += 0.01;
  cube.rotation.y += 0.01;
  renderer.render(scene, camera);
}
animate();

// Glow scale intro
cube.scale.set(0,0,0);
gsap.to(cube.scale, { x:1, y:1, z:1, duration:1.2, ease:"back.out(1.7)" });

// Resize handler
window.addEventListener('resize', ()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
